<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>繡球花賞花邀請函</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@200;300;400;600&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  min-height: 100vh;
  background: radial-gradient(ellipse at 30% 20%, #e8dff5 0%, #fdf8e4 45%, #ede4f6 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Noto Serif TC', serif;
  padding: 32px 16px;
  overflow-x: hidden;
  position: relative;
}

.blob {
  position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
  filter: blur(80px);
  animation: blobFloat 14s ease-in-out infinite alternate;
}
.blob1 { width:420px; height:420px; background:rgba(176,140,220,0.18); top:-100px; left:-120px; }
.blob2 { width:320px; height:320px; background:rgba(230,198,80,0.16); bottom:-80px; right:-100px; animation-delay:4s; }
.blob3 { width:180px; height:180px; background:rgba(200,170,240,0.12); top:50%; left:55%; animation-delay:2s; }
@keyframes blobFloat {
  from { transform: translate(0,0); }
  to   { transform: translate(18px,28px); }
}

.petals { position:fixed; inset:0; pointer-events:none; z-index:1; overflow:hidden; }
.pt {
  position:absolute; top:-20px; border-radius:60% 30% 60% 30%;
  animation: ptFall linear infinite; opacity:0;
}
@keyframes ptFall {
  0%   { opacity:.75; transform:translateY(0) rotate(0deg) translateX(0); }
  100% { opacity:0;   transform:translateY(105vh) rotate(480deg) translateX(30px); }
}
.pt:nth-child(1)  { left:6%;  width:9px;  height:9px;  background:#c4a8e0; animation-duration:10s; animation-delay:0s;   }
.pt:nth-child(2)  { left:17%; width:7px;  height:7px;  background:#e0d060; animation-duration:8s;  animation-delay:2s;   }
.pt:nth-child(3)  { left:28%; width:10px; height:10px; background:#b8a0d8; animation-duration:12s; animation-delay:1s;   }
.pt:nth-child(4)  { left:40%; width:8px;  height:8px;  background:#e8c840; animation-duration:9s;  animation-delay:3.5s; }
.pt:nth-child(5)  { left:52%; width:9px;  height:9px;  background:#d0b4e8; animation-duration:11s; animation-delay:0.5s; }
.pt:nth-child(6)  { left:63%; width:7px;  height:7px;  background:#ddd060; animation-duration:13s; animation-delay:4s;   }
.pt:nth-child(7)  { left:74%; width:11px; height:11px; background:#c0a0d8; animation-duration:9s;  animation-delay:1.5s; }
.pt:nth-child(8)  { left:85%; width:8px;  height:8px;  background:#e0e060; animation-duration:10s; animation-delay:2.5s; }
.pt:nth-child(9)  { left:23%; width:6px;  height:6px;  background:#b098d0; animation-duration:14s; animation-delay:6s;   }
.pt:nth-child(10) { left:91%; width:9px;  height:9px;  background:#c8b840; animation-duration:8s;  animation-delay:3s;   }

/* ── Card ── */
.card {
  position: relative; z-index: 10;
  width: 100%; max-width: 440px;
  background: rgba(255,253,248,0.95);
  backdrop-filter: blur(16px);
  border-radius: 3px;
  overflow: hidden;
  box-shadow:
    0 0 0 1px rgba(176,140,220,0.28),
    0 16px 48px rgba(130,90,180,0.16),
    0 48px 96px rgba(130,90,180,0.10);
  animation: cardRise 1.1s cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes cardRise {
  from { opacity:0; transform:translateY(50px) scale(0.97); }
  to   { opacity:1; transform:translateY(0) scale(1); }
}

/* ── Header ── */
.header {
  background: linear-gradient(140deg, #a87dc8 0%, #b8952a 100%);
  padding: 36px 36px 28px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.header::before {
  content:'';
  position:absolute; inset:0;
  background: repeating-linear-gradient(
    -45deg, transparent, transparent 20px,
    rgba(255,255,255,0.04) 20px, rgba(255,255,255,0.04) 21px
  );
}

.hyd { position:absolute; pointer-events:none; opacity:.22; }
.hyd-tr { top:-14px; right:-14px; width:130px; height:130px; transform:rotate(15deg); }
.hyd-bl { bottom:-14px; left:-14px; width:110px; height:110px; transform:rotate(-20deg) scaleX(-1); }

.eyebrow {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 12px;
  color: rgba(255,255,255,0.72);
  letter-spacing: 4px;
  margin-bottom: 10px;
  position: relative;
}
.header h1 {
  font-weight: 300;
  font-size: 25px;
  color: #fff;
  letter-spacing: 6px;
  line-height: 1.6;
  position: relative;
  text-shadow: 0 2px 10px rgba(80,40,120,0.25);
}
.flower-row {
  margin-top: 14px;
  font-size: 20px;
  letter-spacing: 10px;
  position: relative;
  display: inline-block;
  animation: sway 5s ease-in-out infinite;
}
@keyframes sway {
  0%,100% { transform:rotate(-2.5deg); }
  50%      { transform:rotate(2.5deg); }
}

/* ── Body ── */
.body { padding: 32px 36px 28px; }

.greeting {
  font-size: 15px;
  color: #3a2d52;
  line-height: 2.3;
  font-weight: 300;
  margin-bottom: 28px;
  text-align: justify;
}
.greeting strong { color: #8b5cc0; font-weight: 600; }

.info-box {
  border: 1px solid rgba(176,140,220,0.3);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 28px;
}
.info-row {
  display: flex;
  align-items: stretch;
  border-bottom: 1px solid rgba(176,140,220,0.15);
  transition: background .2s;
}
.info-row:last-child { border-bottom: none; }
.info-row:hover { background: rgba(235,225,252,0.35); }

.info-icon {
  width: 50px;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; flex-shrink: 0;
  background: linear-gradient(180deg, rgba(235,225,252,0.6), rgba(253,248,215,0.6));
  border-right: 1px solid rgba(176,140,220,0.15);
}
.info-content { padding: 14px 18px; flex:1; }
.info-label {
  font-size: 9px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: #c4a030;
  margin-bottom: 4px;
}
.info-value {
  font-size: 14px;
  color: #3a2d52;
  line-height: 1.7;
}
.info-sub {
  font-size: 12px;
  color: #9b8ab0;
  margin-top: 2px;
}

.closing {
  text-align: center;
  border-top: 1px dashed rgba(176,140,220,0.35);
  padding-top: 22px;
}
.closing p {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 17px;
  color: #7a5a9a;
  line-height: 2.2;
}
.closing .sig {
  margin-top: 14px;
  font-family: 'Noto Serif TC', serif;
  font-style: normal;
  font-size: 11px;
  letter-spacing: 3px;
  color: #b89fd4;
}

.footer-band {
  height: 7px;
  background: linear-gradient(90deg, #b89fd4, #e8c840, #c4a8e0, #d4b840, #b89fd4);
  background-size: 200% 100%;
  animation: bandShift 6s linear infinite;
}
@keyframes bandShift {
  from { background-position: 0% 0%; }
  to   { background-position: 200% 0%; }
}
</style>
</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<div class="petals">
  <div class="pt"></div><div class="pt"></div><div class="pt"></div><div class="pt"></div>
  <div class="pt"></div><div class="pt"></div><div class="pt"></div><div class="pt"></div>
  <div class="pt"></div><div class="pt"></div>
</div>

<div class="card">

  <div class="header">
    <svg class="hyd hyd-tr" viewBox="0 0 130 130" fill="none">
      <circle cx="65" cy="65" r="7" fill="white"/>
      <circle cx="65" cy="47" r="8" fill="white"/><circle cx="80" cy="55" r="8" fill="white"/>
      <circle cx="80" cy="75" r="8" fill="white"/><circle cx="65" cy="83" r="8" fill="white"/>
      <circle cx="50" cy="75" r="8" fill="white"/><circle cx="50" cy="55" r="8" fill="white"/>
      <circle cx="65" cy="30" r="7" fill="white"/><circle cx="80" cy="35" r="7" fill="white"/>
      <circle cx="92" cy="48" r="7" fill="white"/><circle cx="95" cy="65" r="7" fill="white"/>
      <circle cx="88" cy="82" r="7" fill="white"/><circle cx="75" cy="94" r="7" fill="white"/>
      <circle cx="56" cy="95" r="7" fill="white"/><circle cx="42" cy="87" r="7" fill="white"/>
      <circle cx="34" cy="73" r="7" fill="white"/><circle cx="34" cy="55" r="7" fill="white"/>
      <circle cx="42" cy="40" r="7" fill="white"/>
    </svg>
    <svg class="hyd hyd-bl" viewBox="0 0 110 110" fill="none">
      <circle cx="55" cy="55" r="6" fill="white"/>
      <circle cx="55" cy="40" r="7" fill="white"/><circle cx="68" cy="47" r="7" fill="white"/>
      <circle cx="68" cy="63" r="7" fill="white"/><circle cx="55" cy="70" r="7" fill="white"/>
      <circle cx="42" cy="63" r="7" fill="white"/><circle cx="42" cy="47" r="7" fill="white"/>
      <circle cx="55" cy="25" r="6" fill="white"/><circle cx="70" cy="30" r="6" fill="white"/>
      <circle cx="80" cy="43" r="6" fill="white"/><circle cx="82" cy="58" r="6" fill="white"/>
    </svg>

    <div class="eyebrow">Hydrangea Season · 繡球花季</div>
    <h1>大安森林公園<br>繡球花賞遊</h1>
    <div class="flower-row">💜 🌸 💛</div>
  </div>

  <div class="body">

    <p class="greeting">
      親愛的 <strong>楊先生</strong>，<br><br>
      繡球花季悄然來臨，大安森林公園的花叢間已染上一片迷人的紫與黃。誠摯邀請您撥冗同行，在花海中漫步，共享這難得的春日美景。
    </p>

    <div class="info-box">
      <div class="info-row">
        <div class="info-icon">📅</div>
        <div class="info-content">
          <div class="info-label">日期</div>
          <div class="info-value">3 月 14 日（星期六）</div>
        </div>
      </div>
      <div class="info-row">
        <div class="info-icon">🕑</div>
        <div class="info-content">
          <div class="info-label">集合時間</div>
          <div class="info-value">下午 1:30</div>
        </div>
      </div>
      <div class="info-row">
        <div class="info-icon">📍</div>
        <div class="info-content">
          <div class="info-label">集合地點</div>
          <div class="info-value">二街全家便利商店門口</div>
          <div class="info-sub">（或附近方便的地點皆可）</div>
        </div>
      </div>
      <div class="info-row">
        <div class="info-icon">🍽️</div>
        <div class="info-content">
          <div class="info-label">小小拜託</div>
          <div class="info-value">煩請您事先尋找晚餐餐廳<br>期待您的美食推薦 😊</div>
        </div>
      </div>
    </div>

    <div class="closing">
      <p>繡球盛開，紫意漫漫<br>願與您共賞這一季最美的花海 💜</p>
      <div class="sig">期待您的到來 · 敬上</div>
    </div>

  </div>

  <div class="footer-band"></div>
</div>

</body>
</html>
